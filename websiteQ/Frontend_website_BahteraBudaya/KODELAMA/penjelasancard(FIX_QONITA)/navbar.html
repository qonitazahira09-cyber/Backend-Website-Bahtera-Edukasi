<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Navbar Example</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
  <style>
    /* =========================================== */
    /* IMPORT FONTS - Already handled via link tags */
    /* =========================================== */

    /* =========================================== */
    /* GLOBAL RESET */
    /* =========================================== */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      height: 100%;
    }

    body {
      font-family: 'Montserrat', sans-serif;
      line-height: 1.6;
      background: #ffffff;
      color: #222;
    }

    input[type="search"]::-webkit-search-cancel-button,
    input[type="search"]::-webkit-search-decoration,
    input[type="search"]::-webkit-search-results-button,
    input[type="search"]::-webkit-search-results-decoration {
      display: none;
    }

    /* =========================================== */
    /* SITE HEADER */
    /* =========================================== */
    .site-header {
      background: #5a1919;
      color: #fff;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 72px;
      z-index: 1000;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.1);
    }

    .container {
      max-width: 1440px;
      margin: 0 auto;
      padding: 0 80px;
    }

    .header-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 100%;
    }

    .brand {
      display: flex;
      align-items: center;
      text-decoration: none;
      color: #fff;
    }

    .brand-icon {
      display: block;
      width: 120px;
      height: 70px;
      object-fit: contain;
    }

    /* =========================================== */
    /* NAVIGATION */
    /* =========================================== */
    .main-nav {
      margin-left: auto;
      margin-right: 45px;
    }

    .main-nav ul {
      display: flex;
      gap: 35px;
      list-style: none;
    }

    .main-nav a {
      position: relative;
      display: inline-block;
      color: #ffffff;
      text-decoration: none;
      font-family: 'Poppins', sans-serif;
      font-weight: 700;
      font-size: 17px;
      letter-spacing: 0.6px;
      padding: 8px 0;
      transition: opacity 0.18s ease, transform 0.18s ease;
    }

    .main-nav a::after {
      content: "";
      position: absolute;
      bottom: -1px;
      left: 0;
      width: 0%;
      height: 2px;
      background-color: #ffffff;
      transition: width 0.3s ease;
    }

    .main-nav a:hover::after,
    .main-nav a.active::after {
      width: 100%;
    }

    .main-nav a:hover,
    .main-nav a.active {
      opacity: 0.9;
      transform: translateY(-2px);
    }

    /* =========================================== */
    /* ACTIONS */
    /* =========================================== */
    .actions {
      display: flex;
      align-items: center;
      gap: 24px;
    }

    .search {
      display: flex;
      align-items: center;
      background: #fff;
      border-radius: 15px;
      height: 38px;
      overflow: hidden;
    }

    .search input {
      border: none;
      outline: none;
      padding: 0 16px;
      height: 38px;
      width: 230px;
      font-size: 14px;
    }

    .search input::placeholder {
      color: #808080;
    }

    .search-btn {
      border: none;
      background: transparent;
      padding: 0 12px;
      cursor: pointer;
      color: #000000;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .search-clear {
      border: none;
      background: transparent;
      padding: 0 8px;
      height: 38px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #666;
      font-size: 12px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.12s ease;
    }

    .search-clear svg,
    .search-btn svg {
      width: 18px;
      height: 18px;
    }

    .search-form input {
      padding-left: 10px;
    }

    .search input:not(:placeholder-shown) + .search-clear {
      opacity: 1;
      pointer-events: auto;
    }

    /* =========================================== */
    /* LANGUAGE MENU */
    /* =========================================== */
    .lang-menu {
      position: relative;
    }

    .lang-btn {
      background: none;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      color: #fff;
      padding: 4px;
      transition: transform 0.15s ease;
    }

    .lang-btn:hover {
      transform: scale(1.05);
    }

    .lang-menu .flag {
      width: 43px;
      height: 43px;
      border-radius: 50%;
      overflow: hidden;
      display: inline-block;
      border: 2px solid rgba(255, 255, 255, 0.3);
      box-shadow: 0 0 8px rgba(0,0,0,0.1);
    }

    .chev {
      width: 10px;
      height: 6px;
    }

    .lang-dropdown {
      position: absolute;
      top: 57px;
      right: 0;
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(12px);
      border-radius: 12px;
      box-shadow: 0 6px 18px rgba(0,0,0,0.15);
      display: none;
      flex-direction: column;
      min-width: 180px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.3);
      transform: translateY(-8px);
      opacity: 0;
      transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
    }

    #lang-toggle:checked ~ .lang-dropdown {
      display: flex;
      transform: translateY(0);
      opacity: 1;
    }

    .lang-option {
      padding: 12px 16px;
      color: #222;
      text-decoration: none;
      font-size: 15px;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 10px;
      transition: all 0.25s ease;
      background: transparent;
    }

    .lang-option:hover {
      background: linear-gradient(90deg, rgba(255,255,255,0.8), rgba(245,245,245,0.95));
      transform: translateX(5px) scale(1.03);
      box-shadow: 0 2px 6px rgba(0,0,0,0.08);
    }

    .lang-option:hover .opt-flag {
      box-shadow: 0 0 10px rgba(100, 100, 100, 0.4);
    }

    .opt-flag {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      overflow: hidden;
      flex-shrink: 0;
    }

    .opt-flag svg {
      width: 100%;
      height: 100%;
      display: block;
    }

    #lang-toggle {
      display: none;
    }

    #lang-toggle:checked ~ .lang-dropdown {
      display: flex;
      animation: fadeIn 0.2s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-6px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* =========================================== */
    /* RESPONSIVE NAVIGATION */
    /* =========================================== */
    @media (max-width: 920px) {
      .container {
        padding: 0 40px;
      }
      
      .main-nav ul {
        gap: 25px;
      }
      
      .search input {
        width: 180px;
      }
    }

    @media (max-width: 680px) {
      .main-nav {
        display: none;
      }
      
      .search input {
        width: 120px;
      }
    }

    /* =========================================== */
    /* ACTIVE STATE UNTUK NAVBAR */
    /* =========================================== */
    .main-nav a.active::after,
    .main-nav a:hover::after {
      width: 100%;
    }

    .main-nav a.active,
    .main-nav a:hover {
      opacity: 0.9;
      transform: translateY(-2px);
    }

    /* =========================================== */
    /* ACTIVE STATE NAVBAR - Perbaikan logika active state */
    /* =========================================== */
    .main-nav a.active::after {
      width: 100%;
      opacity: 1;
    }

    .main-nav a.active {
      opacity: 0.9;
      transform: translateY(-2px);
    }

    /* =========================================== */
    /* SCROLL BEHAVIOR */
    /* =========================================== */
    html {
      scroll-behavior: smooth;
    }
  </style>
</head>
<body>

      <a class="brand" href="#home">
        <!-- Gunakan placeholder gambar atau sesuaikan path jika diperlukan -->
        <img class="brand-icon" src="https://via.placeholder.com/120x70?text=Logo" alt="Bahtera Edukasi" width="120" height="70">
      </a>
      <nav class="main-nav" aria-label="Utama">
        <ul>

              </svg>

        </form>
        <div class="lang-menu">

                  <path fill="#fff" d="M256 19.48c65.3 0 124.46 26.48 167.25 69.27l1.09 1.18c42.14 42.71 68.18 101.37 68.18 166.06 0 65.31-26.5 124.46-69.29 167.25l-1.18 1.09c-42.73 42.16-101.4 68.19-166.05 68.19-65.23 0-124.37-26.51-167.18-69.33-42.84-42.74-69.33-101.89-69.33-167.2 0-65.31 26.48-124.45 69.27-167.24C131.55 45.96 190.7 19.48 256 19.48z"/>
                  <path fill="red" d="M472.41 256.42H39.6v-.43c0-119.51 96.89-216.4 216.4-216.4 119.52 0 216.41 96.89 216.41 216.4v.43z"/>
                </g>
              </svg>
            </span>
            <svg class="chev" width="10" height="6" viewBox="0 0 10 6" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
              <path d="M1 1l4 3 4-3" fill="none" stroke="#fff" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </label>
          <div class="lang-dropdown" role="menu" aria-label="Pilih Bahasa">
            <a href="#" class="lang-option" role="menuitem">
              <span class="opt-flag">
                <svg xmlns="http://www.w3.org/2000/svg" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" image-rendering="optimizeQuality" fill-rule="evenodd" clip-rule="evenodd" viewBox="0 0 512 512" aria-hidden="true">
                  <g fill-rule="nonzero">
                    <path fill="#999" d="M256 0c70.68 0 134.69 28.66 181.01 74.99C483.34 121.31 512 185.32 512 256c0 70.68-28.66 134.69-74.99 181.01C390.69 483.34 326.68 512 256 512c-70.68 0-134.69-28.66-181.01-74.99C28.66 390.69 0 326.68 0 256c0-70.68 28.66-134.69 74.99-181.01C121.31 28.66 185.32 0 256 0z"/>
                    <path fill="#fff" d="M256 19.48c65.3 0 124.46 26.48 167.25 69.27l1.09 1.18c42.14 42.71 68.18 101.37 68.18 166.06 0 65.31-26.5 124.46-69.29 167.25l-1.18 1.09c-42.73 42.16-101.4 68.19-166.05 68.19-65.23 0-124.37-26.51-167.18-69.33-42.84-42.74-69.33-101.89-69.33-167.2 0-65.31 26.48-124.45 69.27-167.24C131.55 45.96 190.7 19.48 256 19.48z"/>

                  </g>
                </svg>

              Indonesia
            </a>

                <svg xmlns="http://www.w3.org/2000/svg" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" image-rendering="optimizeQuality" fill-rule="evenodd" clip-rule="evenodd" viewBox="0 0 512 512" aria-hidden="true">

              English

          </div>
        </div>
      </div>
    </div>
  </header>
  <!-- Isi body kosong agar navbar tetap terlihat, tapi bisa ditambahkan konten jika diperlukan -->
  <div style="height: 100vh; background: #f9f9f9;"></div>
</body>
</html>

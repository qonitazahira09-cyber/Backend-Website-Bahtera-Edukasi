<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lupa Kata Sandi - Bahtera Edukasi</title>
    <!-- Impor font dari Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Garamond:ital,wght@0,400;0,700;1,400&family=Montserrat:wght@400;500;700&display=swap" rel="stylesheet">
    <!-- Link ke file CSS khusus halaman lupa password -->
    <link rel="stylesheet" href="lupakatasandi.css">
</head>
<body>
    <!-- Container utama halaman lupa password -->
    <div class="forgot-container">
        <!-- Bagian kiri: Logo murni tanpa background -->
        <div class="forgot-illustration">
            <img 
                src="assetloginAdmin/Group 81.png" 
                alt="Logo Bahtera Edukasi" 
                class="illustration-logo"
                style="width: 100%; max-width: none; height: auto;"
            >
        </div>

        <!-- Bagian kanan: Form lupa password -->
        <div class="forgot-form">
            <h1 class="form-title">Lupa Kata Sandi</h1>
            <p class="form-subtitle">
                Masukkan email terdaftar untuk menerima tautan reset kata sandi.
            </p>

            <!-- Grup input email -->
            <div class="input-group">
                <label for="email" class="input-label">Email</label>
                <input
                    type="email"
                    id="email"
                    class="input-field"
                    placeholder="Masukkan email Anda"
                >
            </div>

            <!-- Tombol reset password -->
            <button class="btn-reset">Kirim Tautan Reset</button>
            
            <!-- Link kembali ke login -->
            <a href="page-loginAdmin.php" class="back-to-login">Kembali ke Login</a>
        </div>
    </div>
</body>
</html>
